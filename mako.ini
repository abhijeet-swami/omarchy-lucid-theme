background-color=#1c1e2420
text-color=#e8eaf0ff
border-color=#ffffff70
progress-color=#a8c7fa8c
border-size=1
border-radius=16
width=380
padding=16,18
margin=16
anchor=top-right
layer=overlay
font=SF Pro Display 12
max-icon-size=40
icon-location=left
default-timeout=5000
ignore-timeout=0

[app-name=Spotify]
invisible=1

[mode=do-not-disturb]
invisible=1

[mode=do-not-disturb app-name=notify-send]
invisible=0

[urgency=low]
background-color=#1c1e2420
border-color=#ffffff45
text-color=#e8eaf0bf
default-timeout=3500

[urgency=normal]
background-color=#1c1e2420
border-color=#ffffff70
text-color=#e8eaf0ff

[urgency=critical]
background-color=#e0757520
border-color=#e07575bf
text-color=#ffeeaaff
default-timeout=0
