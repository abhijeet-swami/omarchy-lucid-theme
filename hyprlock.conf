$inner_color  = rgba(0, 0, 0, 0)
$outer_color  = rgba(0, 0, 0, 0)
$font_color   = rgba(0, 0, 0, 0)
$check_color  = rgba(0, 0, 0, 0)
$foreground   = rgba(232, 234, 240, 1.0)
$text_muted   = rgba(232, 234, 240, 0.65)
$glass_base   = rgba(255, 255, 255, 0.10)
$glass_border = rgba(255, 255, 255, 0.22)
$shadow       = rgba(0, 0, 0, 0.30)

general {
    disable_loading_bar = false
    grace       = 2
    hide_cursor = true
    no_fade_in  = false
    no_fade_out = false
    ignore_empty_input = false
}

background {
    monitor =
    path = screenshot
    blur_passes  = 5
    blur_size    = 10
    brightness   = 0.78
    contrast     = 0.88
    vibrancy     = 0.22
    vibrancy_darkness = 0.05
}

label {
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = $foreground
    font_size   = 96
    position = 0, 260
    shadow_passes = 4
    shadow_size   = 18
    shadow_color  = rgba(0, 0, 0, 0.38)
    halign = center
    valign = center
}

label {
    text = cmd[update:43200000] echo "$(date +"%A, %B %d")"
    color = $text_muted
    font_size   = 20
    position = 0, 175
    shadow_passes = 2
    shadow_size   = 8
    shadow_color  = $shadow
    halign = center
    valign = center
}

label {
    text = Hi, $USER
    color = $text_muted
    font_size   = 13
    position = 0, -142
    shadow_passes = 2
    shadow_size   = 4
    shadow_color  = $shadow
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 260, 48
    inner_color  = rgba(28, 30, 36, 0.52)
    outer_color  = rgba(255, 255, 255, 0.32)
    font_color   = rgba(232, 234, 240, 1.0)
    outline_thickness = 1
    rounding = 14
    dots_size    = 0.30
    dots_spacing = 0.40
    dots_center  = true
    dots_rounding = 10
    fade_on_empty = true
    fade_timeout  = 1200
    placeholder_text = <span foreground="##9094a0"><i>Password</i></span>
    hide_input = false
    fail_color   = rgba(224, 117, 117, 0.85)
    fail_text    = <i>Wrong Password</i>
    fail_timeout = 1800
    fail_transition = 300
    check_color  = rgba(168, 199, 250, 0.90)
    shadow_passes = 4
    shadow_size   = 20
    shadow_color  = rgba(0, 0, 0, 0.25)
    position = 0, -200
    halign   = center
    valign   = center
}
