$background      = rgba(0, 0, 0, 0)
$shadow_color    = rgba(0, 0, 0, 0.45)
$shadow_inactive = rgba(0, 0, 0, 0.22)

$active_border   = rgba(ffffff60) rgba(ffffff18) 100deg
$inactive_border = rgba(ffffff28) rgba(ffffff08) 100deg

$group_border_active   = rgba(a8c7fa60) rgba(a8c7fa18) 100deg
$group_border_inactive = rgba(ffffff18) rgba(ffffff06) 100deg
$group_locked_active   = rgba(c9a8f560) rgba(c9a8f518) 100deg
$group_locked_inactive = rgba(ffffff18) rgba(ffffff06) 100deg


general {
    gaps_in  = 6
    gaps_out = 14
    border_size = 2

    col.active_border   = $active_border
    col.inactive_border = $inactive_border

    resize_on_border       = true
    extend_border_grab_area = 15
    allow_tearing          = false
    layout                 = dwindle
}

group {
    col.border_active          = $group_border_active
    col.border_inactive        = $group_border_inactive
    col.border_locked_active   = $group_locked_active
    col.border_locked_inactive = $group_locked_inactive
}

group:groupbar {
    enabled   = true
    font_size = 10
    gaps_in   = 3
    gaps_out  = 3
}

decoration {
    rounding = 20
    active_opacity   = 1.0
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0

    blur {
        enabled           = true
        size              = 3
        passes            = 2
        new_optimizations = true
        ignore_opacity    = true
        contrast          = 0.85
        noise             = 0.04
    }

    shadow {
        enabled      = true
        range        = 50
        render_power = 3
        color        = $shadow_color
        color_inactive = $shadow_inactive
        offset       = 0 8
        scale        = 1.0
    }
}

animations {
    enabled = yes

    bezier = spring,    0.18, 0.89, 0.44, 1.2
    bezier = fluent,    0.22, 1.0,  0.36, 1.0
    bezier = snap,      0.55, 0.0,  1.0,  0.45
    bezier = momentum,  0.25, 1.0,  0.5,  1.0
    bezier = overshoot, 0.34, 1.56, 0.64, 1.0
    bezier = decel,     0.05, 0.7,  0.1,  1.0
    bezier = accel,     0.3,  0.0,  0.8,  0.15
    bezier = expo,      0.16, 1.0,  0.3,  1.0

    animation = windows,          1, 3.2, fluent
    animation = windowsIn,        1, 3.5, spring,   popin 85%
    animation = windowsOut,       1, 2.0, snap,     popin 90%
    animation = windowsMove,      1, 3.0, fluent

    animation = fade,             1, 2.8, fluent
    animation = fadeIn,           1, 3.0, decel
    animation = fadeOut,          1, 1.8, accel
    animation = fadeDim,          1, 2.4, fluent
    animation = fadeSwitch,       1, 1.8, fluent

    animation = layers,           1, 2.5, fluent
    animation = layersIn,         1, 2.8, decel
    animation = layersOut,        1, 1.6, accel

    animation = workspaces,       1, 3.5, momentum, slide
    animation = specialWorkspace, 1, 3.0, overshoot, slidevert

    animation = border,           1, 3.0, expo
    animation = borderangle,      1, 4.0, fluent
}

layerrule {
    name = blur_surfaces
    match:namespace = ^(walker|notifications|swayosd|waybar)$
    blur = true
    ignore_alpha = 0.1
}


misc {
    background_color = $background
}
