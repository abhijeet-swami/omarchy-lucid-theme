$background      = rgba(0, 0, 0, 0)
$shadow_color    = rgba(0, 0, 0, 0.98)
$shadow_inactive = rgba(0, 0, 0, 0.54)

$active_border   = rgba(ffffff60) rgba(ffffff18) 100deg
$inactive_border = rgba(ffffff28) rgba(ffffff08) 100deg

$group_border_active   = rgba(a8c7fa60) rgba(a8c7fa18) 100deg
$group_border_inactive = rgba(ffffff18) rgba(ffffff06) 100deg
$group_locked_active   = rgba(c9a8f560) rgba(c9a8f518) 100deg
$group_locked_inactive = rgba(ffffff18) rgba(ffffff06) 100deg


general {
    gaps_in  = 6
    gaps_out = 14
    border_size = 2

    col.active_border   = $active_border
    col.inactive_border = $inactive_border

    resize_on_border       = true
    extend_border_grab_area = 15
    allow_tearing          = false
    layout                 = dwindle
}

group {
    col.border_active          = $group_border_active
    col.border_inactive        = $group_border_inactive
    col.border_locked_active   = $group_locked_active
    col.border_locked_inactive = $group_locked_inactive
}

group:groupbar {
    enabled   = true
    font_size = 10
    gaps_in   = 3
    gaps_out  = 3
}

decoration {
    rounding = 20
    active_opacity   = 1.0
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0

    blur {
        enabled           = true
        size              = 4
        passes            = 4
        new_optimizations = true
        ignore_opacity    = true
        brightness        = 1.1
        contrast          = 0.85
        noise             = 0.02
        vibrancy          = 0.2
        vibrancy_darkness = 0.1
        new_optimizations = true
        ignore_opacity    = true
    }

    shadow {
        enabled      = true
        range        = 50
        render_power = 3
        color        = rgba(0, 0, 0, 0.35)
        color_inactive = rgba(0, 0, 0, 0.28)
        offset       = 0 4
        scale        = 0.97
    }
}

animations {
    enabled = true
    bezier = spring,  0.28, 1.18, 0.42, 1.0
    bezier = close,   0.32, 0.08, 0.20, 0.96
    bezier = slides,   0.22, 1.0,  0.36, 1.0
    bezier = fade,    0.30, 0.0,  0.30, 1.0
    bezier = border,  0.22, 0.9,  0.36, 1.0

    animation = windowsIn,   1, 4.5, spring, popin 88%
    animation = windowsOut,  1, 3.5, close,  popin 88%
    animation = windowsMove, 1, 4.0, spring

    animation = fadeIn,     1, 3.5, fade
    animation = fadeOut,    1, 2.8, close
    animation = fadeSwitch, 1, 3.5, fade
    animation = fadeShadow, 1, 3.5, fade
    animation = fadeDim,    1, 3.0, fade
    animation = fadeLayers, 1, 3.0, fade

    animation = border,      1, 6.0, border
    animation = borderangle, 1, 90,  border, loop

    animation = workspaces,       1, 4.5, slides, slide
    animation = specialWorkspace, 1, 4.0, spring, slidevert

    animation = layersIn,  1.5, 3.0, spring, popin 85%
    animation = layersOut, 1.7, 2.5, close,  popin 90%
    animation = layers,    1, 3.0, slides
}


layerrule {
    name = blur_surfaces
    match:namespace = ^(walker|notifications|swayosd|waybar)$
    blur = true
    ignore_alpha = 0.1
}


misc {
    background_color = $background
}
